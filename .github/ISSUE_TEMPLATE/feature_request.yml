name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        This fork's focus is the modernized stack (Gradio 6 / transformers 5),
        the per-mode UI, and the built-in AI assistant. Requests that fit that
        scope are most likely to land — general Forge/A1111 features may be a
        better fit upstream.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's getting in the way today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, or anything else that helps.
    validations:
      required: false
